---
# Deployment - tells Kubernetes to run 2 nginx pods and keep them running
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: default
  labels:
    app: nginx-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          # Resource limits prevent a single pod from consuming all node resources
          resources:
            requests:
              cpu: "100m"      # 0.1 CPU cores minimum guaranteed
              memory: "64Mi"   # 64MB RAM minimum guaranteed
            limits:
              cpu: "200m"      # 0.2 CPU cores maximum allowed
              memory: "128Mi"  # 128MB RAM maximum allowed

---
# Service - exposes the deployment on a stable port across all nodes
apiVersion: v1
kind: Service
metadata:
  name: nginx-test
  namespace: default
spec:
  type: NodePort
  selector:
    app: nginx-test   # routes traffic to pods with this label
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080  # fixed port accessible on any node IP
