title: SSH Brute Force Attack
id: a8f3b2c1-4d5e-6f7a-8b9c-0d1e2f3a4b5c
status: stable
description: Detects repeated SSH authentication failures from a single source IP,
  indicating a brute force attempt against SSH.
references:
  - https://attack.mitre.org/techniques/T1110/001/
author: k0r4y
date: 2026-06-20
tags:
  - attack.credential_access
  - attack.t1110.001
logsource:
  product: linux
  service: sshd
detection:
  selection:
    body|contains: 'Failed password'
  condition: selection | count(src_ip) > 8
falsepositives:
  - Legitimate users mistyping passwords repeatedly
  - Automated scripts with wrong credentials
level: high
