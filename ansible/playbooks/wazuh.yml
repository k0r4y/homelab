---
- name: Deploy Wazuh on node03
  hosts: node03
  become: true

  tasks:
    - name: Download Wazuh installer
      ansible.builtin.get_url:
        url: https://packages.wazuh.com/4.10.1/wazuh-install.sh
        dest: /tmp/wazuh-install.sh
        mode: "0755"

    - name: Run Wazuh all-in-one installation
      ansible.builtin.command:
        cmd: /tmp/wazuh-install.sh --generate-config-files
        creates: /var/ossec/etc/ossec.conf
      register: wazuh_generate

    - name: Run Wazuh installation
      ansible.builtin.command:
        cmd: /tmp/wazuh-install.sh --wazuh-indexer node-1 --wazuh-server wazuh-1 --wazuh-dashboard dashboard --start-cluster
        creates: /var/ossec/bin/wazuh-control

    - name: Ensure wazuh-indexer log directory is managed by systemd-tmpfiles
      ansible.builtin.copy:
        content: "d /var/log/wazuh-indexer 0750 wazuh-indexer wazuh-indexer -"
        dest: /etc/tmpfiles.d/wazuh-indexer.conf
        owner: root
        group: root
        mode: "0644"
