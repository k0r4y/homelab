---
- name: FULL REBUILD - mgmt01
  hosts: mgmt01
  become: true
  gather_facts: true

  vars:
    # Controls whether destructive actions (wipe/recreate) are enabled
    wipe_data: false

    # Base directory where Prometheus + Grafana stack is deployed
    monitoring_dir: /opt/monitoring

    # Base directory where reverse proxy configs are stored
    reverse_proxy_dir: /opt/reverse_proxy

  pre_tasks:
    - name: Safety check - only run on mgmt01
      # Ensures this playbook cannot accidentally run on another host
      ansible.builtin.assert:
        that:
          - inventory_hostname == "mgmt01"
        fail_msg: "This playbook can only run on mgmt01"
        success_msg: "Safety check passed"

  tasks:

    # -------------------------
    # WIPE PHASE (OPTIONAL)
    # This section is only executed when wipe_data = true
    # It is designed for "full reset" scenarios
    # -------------------------

    - name: Get Docker container info
      # Queries Docker daemon for all container metadata
      # Used as the source of truth for cleanup operations
      community.docker.docker_host_info:
      register: docker_info
      when: wipe_data | bool

    - name: Normalize container list
      # Extracts only container names from Docker metadata
      # Ensures downstream tasks work with a simple list of strings
      ansible.builtin.set_fact:
        container_names: >-
          {{
            docker_info.containers
            | default([])
            | map(attribute='Name')
            | list
          }}
      when: wipe_data | bool

    - name: Stop all containers (safe)
      # Gracefully stops running containers before deletion
      # Prevents corruption or abrupt shutdown of services
      community.docker.docker_container:
        name: "{{ item }}"
        state: stopped
      loop: "{{ container_names | default([]) }}"
      when: wipe_data | bool
      ignore_errors: true

    - name: Remove all containers (clean slate)
      # Deletes containers after they have been stopped
      # This does NOT remove volumes unless explicitly configured elsewhere
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
      loop: "{{ container_names | default([]) }}"
      when: wipe_data | bool
      ignore_errors: true

    - name: Wipe data directories (DANGEROUS)
      # WARNING: This permanently deletes persistent application data
      # Includes Grafana dashboards, Prometheus data, and proxy configs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ monitoring_dir }}"
        - "{{ reverse_proxy_dir }}"
      when: wipe_data | bool

    # -------------------------
    # BASE SYSTEM SETUP
    # This ensures the host has all required base dependencies
    # -------------------------

    - name: Run common role
      # Applies baseline system configuration:
      # - updates packages
      # - installs base tools
      # - sets system defaults
      ansible.builtin.include_role:
        name: common

    - name: Run docker role
      # Installs and configures Docker Engine
      # Also ensures Docker service is enabled and running
      ansible.builtin.include_role:
        name: docker

    # -------------------------
    # SERVICES DEPLOYMENT
    # This layer deploys application services on top of Docker
    # -------------------------

    - name: Run monitoring role
      # Deploys Prometheus + Grafana stack via Docker Compose
      ansible.builtin.include_role:
        name: monitoring

    - name: Run reverse proxy role
      # Configures nginx reverse proxy for service routing
      ansible.builtin.include_role:
        name: reverse_proxy

    - name: Run node exporter role
      # Deploys node_exporter for system metrics (Prometheus scraping)
      ansible.builtin.include_role:
        name: node_exporter

    # -------------------------
    # VERIFY SYSTEM HEALTH
    # This confirms services are actually reachable after deployment
    # -------------------------

    - name: Verify Grafana is reachable
      # HTTP health check for Grafana UI availability
      ansible.builtin.uri:
        url: http://localhost:3000
        status_code: 200
      register: grafana_check
      retries: 5
      delay: 5
      until: grafana_check.status == 200

    - name: Verify nginx is reachable
      # HTTP health check for reverse proxy availability
      ansible.builtin.uri:
        url: http://localhost
        status_code: 200
      register: nginx_check
      retries: 5
      delay: 5
      until: nginx_check.status == 200
