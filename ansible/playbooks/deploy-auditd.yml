---
- name: Deploy and configure auditd security monitoring
  hosts: all
  become: true
  tasks:
    - name: Install auditd and auditing utilities
      ansible.builtin.apt:
        name:
          - auditd
          - audispd-plugins
        state: present
        update_cache: true

    - name: Deploy audit rules
      ansible.builtin.copy:
        dest: /etc/audit/rules.d/audit.rules
        owner: root
        group: root
        mode: "0600"
        content: |
          # Delete all existing rules to prevent conflicts
          -D
          # Set buffer size for high-throughput environments
          -b 8192
          # Monitor process execution system calls (execve)
          -a always,exit -F arch=b64 -S execve -k audit-wazuh-execution
          -a always,exit -F arch=b32 -S execve -k audit-wazuh-execution
          # Lock configuration to prevent runtime modifications
          -e 1
      notify: Restart auditd

  handlers:
    - name: Restart auditd
      ansible.builtin.service:
        name: auditd
        state: restarted
        enabled: true
