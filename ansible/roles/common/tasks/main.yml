---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Upgrade system packages
  ansible.builtin.apt:
    upgrade: dist

- name: Install base tools
  ansible.builtin.apt:
    name:
      - git
      - curl
      - wget
      - vim
      - tree
      - jq
    state: present

- name: Set timezone to Amsterdam
  community.general.timezone:
    name: Europe/Amsterdam

- name: Ensure systemd-networkd-wait-online override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/systemd-networkd-wait-online.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure systemd-networkd-wait-online timeout override
  ansible.builtin.copy:
    content: |
      [Service]
      TimeoutStartSec=10
    dest: /etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd daemon
