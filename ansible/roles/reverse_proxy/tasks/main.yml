---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Deploy nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/soc-lab
  notify: Reload nginx

- name: Ensure nginx config exists before enabling
  ansible.builtin.stat:
    path: /etc/nginx/sites-available/soc-lab
  register: nginx_conf

- name: Enable site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/soc-lab
    dest: /etc/nginx/sites-enabled/soc-lab
    state: link
  when: nginx_conf.stat.exists
  notify: Reload nginx

- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Ensure nginx running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
