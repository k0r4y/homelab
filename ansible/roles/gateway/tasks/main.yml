# (Assuming line 9 was your sysctl task, updated to ansible.posix)
- name: Enable IP forwarding in sysctl
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true

- name: Ensure nftables service is enabled and running
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
    daemon_reload: true
    masked: false

- name: Apply nftables ruleset
  ansible.builtin.command:
    cmd: nft -f /etc/nftables.conf
  changed_when: false
  register: gateway_nft_apply
  failed_when: gateway_nft_apply.rc != 0

- name: Show nftables ruleset for verification
  ansible.builtin.command:
    cmd: nft list ruleset
  register: gateway_nft_ruleset
  changed_when: false

- name: Display nftables rules
  ansible.builtin.debug:
    msg: "{{ gateway_nft_ruleset.stdout_lines }}"

- name: Install network troubleshooting tools
  ansible.builtin.apt:
    name:
      - tcpdump
      - traceroute
      - net-tools
      - dnsutils
    state: present

# ---- IP CHANGE (LAST STEP) ----
- name: Remove golden image netplan config (50-cloud-init)
  ansible.builtin.file:
    path: /etc/netplan/50-cloud-init.yaml
    state: absent

- name: Remove golden image netplan config (00-installer-config)
  ansible.builtin.file:
    path: /etc/netplan/00-installer-config.yaml
    state: absent

- name: Write netplan configuration for both interfaces
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: /etc/netplan/50-fw01.yaml
    mode: "0600"

- name: Disable cloud-init network config
  ansible.builtin.file:
    path: /etc/cloud/cloud-init.disabled
    state: touch
    mode: "0644"

- name: Remove ip= parameter from GRUB
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: ' ip=[^ ]*'
    replace: ''
  notify: update grub

# Replaced command + shutdown with the native, safe reboot module
- name: Reboot the gateway immediately to finalize network and GRUB changes
  ansible.builtin.reboot:
    reboot_timeout: 300
