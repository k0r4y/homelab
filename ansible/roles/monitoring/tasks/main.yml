---
# Main tasks for the monitoring stack
# Includes Prometheus, Grafana, cAdvisor, Loki
- name: Create monitoring base directory
  ansible.builtin.file:
    path: "{{ monitoring_dir }}"
    state: directory
    mode: "0755"

- name: Create Loki data directory
  ansible.builtin.file:
    path: "{{ monitoring_loki_data_dir }}"
    state: directory
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy prometheus.yml
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_dir }}/prometheus/prometheus.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Loki configuration
  ansible.builtin.template:
    src: loki-config.yaml.j2
    dest: "{{ monitoring_dir }}/loki-config.yaml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_dir }}"
    state: present

- name: Create Grafana provisioning directory structure
  ansible.builtin.file:
    path: /opt/monitoring/grafana/provisioning/datasources
    state: directory
    mode: "0755"

- name: Deploy Grafana datasources configuration
  ansible.builtin.template:
    src: datasources.yml.j2
    dest: /opt/monitoring/grafana/provisioning/datasources/datasources.yml
    mode: "0644"
  notify: Restart monitoring stack

- name: Create Loki rules directory
  ansible.builtin.file:
    path: "{{ monitoring_dir }}/rules/homelab"
    state: directory
    mode: "0755"

- name: Deploy Loki ruler rules
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../monitoring/loki/rules/"
    dest: "{{ monitoring_dir }}/rules/homelab/"
    mode: "0644"
  notify: Restart monitoring stack
