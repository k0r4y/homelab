---
# ===============================
# Alloy deployment (clean + stable)
# ===============================

- name: Create Alloy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ alloy_config_dir }}"
    - "{{ alloy_data_dir }}"

# -------------------------------
# Deploy Alloy configuration file
# -------------------------------
- name: Deploy Alloy configuration
  ansible.builtin.template:
    src: config.alloy.j2
    dest: "{{ alloy_config_dir }}/config.alloy"
    owner: root
    group: root
    mode: "0644"
    force: true

# -------------------------------
# Run Alloy container
# -------------------------------
- name: Deploy Alloy Docker container on mgmt01
  when: inventory_hostname == "mgmt01"
  community.docker.docker_container:
    name: alloy
    image: "grafana/alloy:{{ alloy_version }}"
    restart_policy: unless-stopped
    state: started
    privileged: true
    recreate: true

    # Attach to same Docker network as Grafana/Loki/Prometheus
    networks:
      - name: monitoring_default

    # Mount config + log sources
    volumes:
      - "{{ alloy_config_dir }}/config.alloy:/etc/alloy/config.alloy:ro"
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
      - "{{ alloy_data_dir }}:/var/lib/alloy"

    # Alloy UI / metrics endpoint
    ports:
      - "12345:12345"

    # Start Alloy with config file
    command: >
      run
      --server.http.listen-addr=0.0.0.0:12345
      /etc/alloy/config.alloy
