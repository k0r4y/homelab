---
- name: Install dependencies
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: true

- name: Download Wazuh agent package
  ansible.builtin.get_url:
    url: "https://packages.wazuh.com/4.x/apt/pool/main/w/wazuh-agent/wazuh-agent_{{ wazuh_agent_version }}_amd64.deb"
    dest: /tmp/wazuh-agent.deb
    mode: "0644"

- name: Install Wazuh agent
  ansible.builtin.apt:
    deb: /tmp/wazuh-agent.deb
    state: present

- name: Configure Wazuh manager IP
  ansible.builtin.replace:
    path: /var/ossec/etc/ossec.conf
    regexp: '<address>MANAGER_IP</address>'
    replace: '<address>{{ wazuh_agent_manager_ip }}</address>'
  notify: restart wazuh-agent

- name: Remove temporary .deb file
  ansible.builtin.file:
    path: /tmp/wazuh-agent.deb
    state: absent

- name: Start and enable Wazuh agent
  ansible.builtin.systemd:
    name: wazuh-agent
    state: started
    enabled: true

- name: Verify agent is active
  ansible.builtin.systemd:
    name: wazuh-agent
  register: wazuh_agent_status
  changed_when: false
  failed_when: wazuh_agent_status.status.ActiveState != "active"
