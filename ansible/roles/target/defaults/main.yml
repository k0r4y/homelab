---
# Default variables for target role
target_ip: "10.10.10.30"
target_gateway: "10.10.10.1"
target_netmask: "24"
target_nameservers:
  - "8.8.8.8"
  - "1.1.1.1"
target_interface: "eth1"
target_enable_vulnerable_services: true

# Base packages to install on all target VMs
target_base_packages:
  - curl
  - vim
  - htop
  - git
  - net-tools
  - wget
  - software-properties-common