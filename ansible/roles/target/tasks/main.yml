---
- name: Include variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_distribution }}.yml"
    - "main.yml"
  tags: always

- name: Ensure netplan directory exists
  ansible.builtin.file:
    path: /etc/netplan
    state: directory
    mode: "0755"

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}"

- name: Ensure ansible user has SSH access
  ansible.builtin.import_tasks: ssh.yml
  when: target_setup_ssh | default(true)

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ target_base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install vulnerable services
  ansible.builtin.import_tasks: vulnerable.yml
  when: target_enable_vulnerable_services | bool
  tags: vulnerable

# ---- IP CHANGE (LAST STEP, NO REBOOT) ----
- name: Write netplan configuration for static IP
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: /etc/netplan/50-target01.yaml
    mode: "0644"

- name: Schedule netplan apply after SSH session ends
  ansible.builtin.shell:
    cmd: |
      nohup bash -c "sleep 2; netplan apply" &
    executable: /bin/bash
  async: 0
  poll: 0
  ignore_errors: true

# ---- IP CHANGE (LAST STEP) ----
- name: Write netplan configuration for the correct IP
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: /etc/netplan/50-{{ inventory_hostname }}.yaml
    mode: "0644"
  when: target_ip is defined

- name: Schedule netplan apply after SSH session ends
  ansible.builtin.shell:
    cmd: |
      nohup bash -c "sleep 2; netplan apply" &
    executable: /bin/bash
  async: 0
  poll: 0
  ignore_errors: true

- name: Remove the secondary .100 IP if present
  ansible.builtin.shell:
    cmd: |
      ip addr del 192.168.178.100/24 dev {{ target_interface | default('eth0') }} 2>/dev/null || true
    executable: /bin/bash
  ignore_errors: true

- name: Disable cloud-init network config
  ansible.builtin.file:
    path: /etc/cloud/cloud-init.disabled
    state: touch

- name: Remove `ip=` parameter from GRUB
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: ' ip=[^ ]*'
    replace: ''
  notify: update grub

- name: Schedule reboot to finalize GRUB changes
  ansible.builtin.command: shutdown -r +1
  async: 0
  poll: 0
  ignore_errors: true