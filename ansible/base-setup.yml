- name: Base setup for all nodes
  hosts: node01
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Upgrade all packages
      apt:
        upgrade: dist

    - name: Install base tools
      apt:
        name:
          - git
          - curl
          - wget
          - vim
          - tree
          - jq
        state: present
